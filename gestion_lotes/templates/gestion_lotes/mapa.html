<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VILLTECC - Sistema de Gestión de Lotes Interactivo</title>
    <style>
        /* 📱 Ajustes exclusivos para Celulares (Pantallas menores a 768px) */
@media (max-width: 768px) {
    body {
        display: flex;
        flex-direction: column-reverse; /* Envía el menú abajo y el mapa arriba */
    }
    #sidebar {
        width: 100%;
        height: 48vh; /* Ocupa casi la mitad inferior */
        position: fixed;
        bottom: 0;
        left: 0;
        z-index: 1000;
        overflow-y: auto; /* ⚡ Permite deslizar la lista de resultados suavemente con el pulgar */
        -webkit-overflow-scrolling: touch; /* Scroll suave estilo nativo en iOS */
    }
    #map-container {
        width: 100%;
        height: 55vh; /* El mapa se queda en la mitad superior */
        margin-left: 0;
    }
}
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 320px;
            background-color: #141419;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }
        h2 { margin-top: 0; color: #4fa3ff; border-bottom: 2px solid #2a2a35; padding-bottom: 10px; }
        
        #estado-inicial { color: #888; font-style: italic; }
        
        .info-card {
            background-color: #22222b;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #555;
            display: none; /* Oculto hasta que se seleccione algo */
        }
        .info-card.libre { border-left-color: #2ecc71; }
        .info-card.ocupado { border-left-color: #e74c3c; }
        
        #map-container {
            flex-grow: 1;
            position: relative;
            background-color: #1a1a20;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }
        
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge.libre { background-color: #2ecc71; color: #fff; }
        .badge.ocupado { background-color: #e74c3c; color: #fff; }
        
        .instrucciones {
            font-size: 12px;
            color: #888;
            margin-top: auto;
            background: #2a2a35;
            padding: 10px;
            border-radius: 6px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    
<div id="modal-edicion" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(2px);">
    <div style="background: #1e1e1e; width: 350px; padding: 25px; border-radius: 12px; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.5); color: #fff;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin: 0; color: #4da6ff;" id="modal-titulo">Editar Lote</h3>
            <button onclick="cerrarModal()" style="background: transparent; border: none; color: #aaa; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        
        <label style="font-size: 12px; color: #aaa;">Nombre del Propietario:</label>
        <input type="text" id="modal-nombre" placeholder="Nombre completo" style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; background: #2a2a2a; color: #fff; border: 1px solid #555; border-radius: 4px; box-sizing: border-box;">
        
        <label style="font-size: 12px; color: #aaa;">DNI (Opcional):</label>
        <input type="text" id="modal-dni" placeholder="Número de DNI" style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; background: #2a2a2a; color: #fff; border: 1px solid #555; border-radius: 4px; box-sizing: border-box;">
        
        <label style="font-size: 12px; color: #aaa;">Estado Legal:</label>
        <select id="modal-estado" style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 25px; background: #2a2a2a; color: #fff; border: 1px solid #555; border-radius: 4px; box-sizing: border-box;">
            <option value="LIBRE">Libre (Verde)</option>
            <option value="OCUPADO">Ocupado (Rojo)</option>
            <option value="REGULARIZANDO">En Regularización</option>
        </select>

        <div style="display: flex; gap: 10px;">
            <button onclick="liberarLoteEnModal()" style="flex: 1; padding: 10px; background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; border-radius: 4px; cursor: pointer; transition: 0.2s;" onmouseover="this.style.background='rgba(255, 77, 77, 0.1)'" onmouseout="this.style.background='transparent'">
                🗑️ Liberar
            </button>
            <button onclick="guardarDesdeModal()" style="flex: 2; padding: 10px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;" onmouseover="this.style.background='#0052a3'" onmouseout="this.style.background='#0066cc'">
                💾 Guardar
            </button>
        </div>
        <div id="modal-mensaje" style="margin-top: 15px; font-size: 13px; text-align: center; min-height: 20px;"></div>
    </div>
    
</div>
    <div id="sidebar">
        <h2>VILLTECC Maps</h2>
        <button onclick="window.location.href='/api/descargar-excel/'" style="width: 100%; margin-bottom: 20px; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;" onmouseover="this.style.background='#219653'" onmouseout="this.style.background='#27ae60'">
    📊 Descargar Reporte en Excel
</button>
        <div style="margin-bottom: 25px; background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
    <div style="display: flex; gap: 8px;">
        <input type="text" id="input-busqueda" placeholder="🔍 Buscar propietario o DNI..." onkeypress="if(event.key === 'Enter') ejecutarBusqueda()" style="flex: 1; padding: 10px 12px; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 6px; outline: none; font-size: 14px;">
        <button onclick="ejecutarBusqueda()" style="padding: 10px 15px; background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">Buscar</button>
    </div>
    
    <div id="resultados-lista" style="margin-top: 15px; font-size: 13px; max-height: 250px; overflow-y: auto; color: #ddd;"></div>
</div>
        <div id="estado-inicial">
            Selecciona un lote en el plano haciendo clic para ver la información detallada.
        </div>
        
        <div id="detalle-lote" class="info-card">
            </div>
        
        <div class="instrucciones">
            <strong>Navegación:</strong><br>
            🖱️ Rueda del mouse para Zoom In/Out<br>
            ✋ Clic sostenido y arrastrar para mover<br>
            🎯 Clic en un lote para ver dueño
        </div>
    </div>

    <div id="map-container">
        <canvas id="mapaCanvas"></canvas>
    </div>
<script>
    // Variable para guardar qué lotes deben resaltar en el Canvas
let lotesDestacados = [];
 // Variable global para guardar los datos temporalmente
let datosBusquedaActual = []; 

function ejecutarBusqueda() {
    const query = document.getElementById('input-busqueda').value.trim();
    const cajaResultados = document.getElementById('resultados-lista');
    
    if (query === "") {
        cajaResultados.innerHTML = "<span style='color: #ff4d4d;'>⚠️ Escribe un nombre o DNI.</span>";
        return;
    }

    cajaResultados.innerHTML = "<span style='color: #aaa;'>Buscando...</span>";

    fetch(`/api/buscar-propietario/?q=${query}`)
        .then(response => response.json())
        .then(data => {
            if (data.error || !data.resultados || data.resultados.length === 0) {
                cajaResultados.innerHTML = "<b>No se encontraron propiedades.</b>";
                return;
            }

            datosBusquedaActual = data.resultados;
            let htmlResultados = `<p style="margin-top:0; margin-bottom:10px; color:#aaa;">Coincidencias: ${datosBusquedaActual.length}</p>`;

            // Tarjetas de resultados en Modo Oscuro
            datosBusquedaActual.forEach((persona, index) => {
                htmlResultados += `
                <div style="background: #2a2a2a; border: 1px solid #444; padding: 12px; margin-bottom: 8px; border-radius: 6px; color: #fff;">
                    <strong style="color: #4da6ff; font-size: 15px;">${persona.nombres}</strong><br>
                    <span style="font-size: 12px; color: #aaa;">DNI: ${persona.dni ? persona.dni : 'No registrado'}</span><br>
                    <button onclick="seleccionarPersona(${index})" style="margin-top: 10px; width: 100%; background: #3a3a3a; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 4px; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#444'" onmouseout="this.style.background='#3a3a3a'">
                        📍 Ver sus ${persona.total_lotes} lote(s)
                    </button>
                </div>`;
            });

            cajaResultados.innerHTML = htmlResultados;
        })
        .catch(error => {
            console.error("Error:", error);
            cajaResultados.innerHTML = "<span style='color: #ff4d4d;'>Error de conexión.</span>";
        });
}
function seleccionarPersona(index) {
    const persona = datosBusquedaActual[index];
    const cajaResultados = document.getElementById('resultados-lista');
    
    // ⚡ 1. Limpiamos y guardamos los nuevos lotes a destacar
    lotesDestacados = persona.lotes.map(l => ({ 
        manzana: String(l.manzana), 
        numero: String(l.numero) 
    }));

    // ⚡ 2. Forzamos al Canvas a redibujar todo el mapa para que aplique el brillo
    // (AQUÍ PON EL NOMBRE DE LA FUNCIÓN QUE DIBUJA TU MAPA, ej: dibujarMapa() o render())
    dibujarMapa(); 

    let htmlLotes = `
        <button onclick="limpiarBusqueda()" style="margin-bottom: 12px; background: transparent; border: none; color: #4da6ff; cursor: pointer; padding: 0;">⬅️ Volver a resultados y limpiar mapa</button>
        <div style="background: #2a2a2a; padding: 12px; border-radius: 6px; border: 1px solid #4da6ff;">
            <b style="font-size: 15px; color: #fff;">${persona.nombres}</b>
            <ul style="padding-left: 20px; margin-top: 10px; margin-bottom: 0; color: #ddd;">
    `;

    persona.lotes.forEach(lote => {
        let colorEstado = lote.estado_legal === 'LIBRE' ? '#28a745' : '#ff4d4d';
        htmlLotes += `<li style="margin-bottom: 5px;">
            <b>Mz ${lote.manzana} - Lte ${lote.numero}</b> 
            <span style="color: ${colorEstado}; font-size: 11px;">(${lote.estado_legal})</span>
        </li>`;
    });

    htmlLotes += "</ul></div>";
    cajaResultados.innerHTML = htmlLotes;
}

// ⚡ Función extra para limpiar el brillo cuando regresamos a la lista
function limpiarBusqueda() {
    lotesDestacados = []; // Borramos la memoria
    dibujarMapa();        // Redibujamos el mapa para quitar el brillo
    ejecutarBusqueda();   // Volvemos a mostrar la lista de nombres
}

        const lotes = JSON.parse('{{ lotes_json|escapejs }}');
        const canvas = document.getElementById('mapaCanvas');
        const ctx = canvas.getContext('2d');
        
        const cardDiv = document.getElementById('detalle-lote');
        const inicialDiv = document.getElementById('estado-inicial');

        // --- 1. PRE-PROCESAMIENTO ESPACIAL ---
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        const manzanasData = {};

        lotes.forEach(l => {
            let sumX = 0, sumY = 0;
            let bxMin = Infinity, bxMax = -Infinity, byMin = Infinity, byMax = -Infinity;
            
            l.path = new Path2D();
            l.coordenadas.forEach((p, index) => {
                const x = p[0];
                const y = -p[1]; 
                
                if (x < minX) minX = x; if (x > maxX) maxX = x;
                if (y < minY) minY = y; if (y > maxY) maxY = y;
                
                if (x < bxMin) bxMin = x; if (x > bxMax) bxMax = x;
                if (y < byMin) byMin = y; if (y > byMax) byMax = y;

                sumX += x; sumY += y;
            });
            l.centroX = sumX / l.coordenadas.length;
            l.centroY = sumY / l.coordenadas.length;
            
            l.areaBox = (bxMax - bxMin) * (byMax - byMin);
            
            if (!manzanasData[l.manzana]) {
                manzanasData[l.manzana] = { sumX: 0, sumY: 0, count: 0 };
            }
            manzanasData[l.manzana].sumX += l.centroX;
            manzanasData[l.manzana].sumY += l.centroY;
            manzanasData[l.manzana].count++;
        });

        lotes.sort((a, b) => b.areaBox - a.areaBox);

        lotes.forEach(l => {
            l.path = new Path2D();
            l.coordenadas.forEach((p, index) => {
                const x = p[0] - minX;
                const y = -p[1] - minY;
                if (index === 0) l.path.moveTo(x, y);
                else l.path.lineTo(x, y);
            });
            l.path.closePath();
            l.cx = l.centroX - minX;
            l.cy = l.centroY - minY;
        });

        // --- 2. MOTOR DE NAVEGACIÓN ---
        let transform = { x: 0, y: 0, scale: 1 };
        let loteHover = null;
        let loteSeleccionado = null;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let hasDragged = false;

        function centrarMapa() {
            const pad = 60;
            const scaleX = (canvas.width - pad * 2) / (maxX - minX);
            const scaleY = (canvas.height - pad * 2) / (maxY - minY);
            transform.scale = Math.min(scaleX, scaleY);
            transform.x = (canvas.width - (maxX - minX) * transform.scale) / 2;
            transform.y = (canvas.height - (maxY - minY) * transform.scale) / 2;
            dibujarMapa();
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            centrarMapa();
        }

// --- 3. MOTOR DE RENDERIZADO ---
        function dibujarMapa() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(transform.x, transform.y);
            ctx.scale(transform.scale, transform.scale);

            // A. DIBUJAR LOS LOTES Y ÁREAS COMUNES
            lotes.forEach(l => {
                const isSelected = (l === loteSeleccionado);
                const isHovered = (l === loteHover && !isSelected);
                
                // ⚡ NUEVO: Verificamos si este lote está en la lista del buscador
                const isDestacado = lotesDestacados.some(dest => 
                    dest.manzana === String(l.manzana) && dest.numero === String(l.numero)
                );

                if (isDestacado) {
                    // ⚡ MODO NEÓN (Buscador)
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.8)'; // Color cyan brillante
                    ctx.strokeStyle = '#ffffff';
                    ctx.shadowColor = '#00ffff';
                    // Escalamos el brillo para que se vea bien sin importar el zoom
                    ctx.shadowBlur = 25 / transform.scale; 
                    ctx.lineWidth = 4 / transform.scale;
                } else {
                    // APAGAMOS LA SOMBRA para que no contamine a los demás lotes
                    ctx.shadowBlur = 0; 
                    
                    // TU LÓGICA ORIGINAL DE 3 COLORES
                    if (l.estado === 'OCUPADO') {
                        ctx.fillStyle = isSelected ? 'rgba(231, 76, 60, 0.9)' : (isHovered ? 'rgba(231, 76, 60, 0.6)' : 'rgba(231, 76, 60, 0.4)');
                        ctx.strokeStyle = isSelected ? '#ffffff' : '#e74c3c';
                    } else if (l.estado === 'AREA_COMUN') {
                        ctx.fillStyle = isSelected ? 'rgba(149, 165, 166, 0.9)' : (isHovered ? 'rgba(149, 165, 166, 0.6)' : 'rgba(149, 165, 166, 0.2)');
                        ctx.strokeStyle = isSelected ? '#ffffff' : '#7f8c8d';
                    } else {
                        ctx.fillStyle = isSelected ? 'rgba(46, 204, 113, 0.9)' : (isHovered ? 'rgba(46, 204, 113, 0.6)' : 'rgba(46, 204, 113, 0.4)');
                        ctx.strokeStyle = isSelected ? '#ffffff' : '#2ecc71';
                    }
                    ctx.lineWidth = (isSelected ? 3 : 1) / transform.scale; 
                }

                ctx.fill(l.path);
                ctx.stroke(l.path);
                
                // IMPORTANTE: Resetear la sombra siempre después de dibujar el lote
                ctx.shadowBlur = 0; 

                // Dibujar Número de Lote (o nombre del parque si es muy grande)
                const fontSize = l.estado === 'AREA_COMUN' ? 18 / transform.scale : 12 / transform.scale;
                
                // Si está destacado, pintamos el texto de negro para que contraste con el cyan
                ctx.fillStyle = isDestacado ? '#000000' : (l.estado === 'AREA_COMUN' ? '#f1c40f' : '#ffffff'); 
                
                ctx.font = `bold ${fontSize}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(l.numero, l.cx, l.cy);
            });

            // B. DIBUJAR NOMBRES DE MANZANAS GIGANTES
            let calculoSize = 40 / transform.scale;
            const mzFontSize = Math.max(10, Math.min(calculoSize, 28)); 
            
            ctx.font = `bold ${mzFontSize}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            for (const mz in manzanasData) {
                if(mz !== "GENERAL" && mz !== "DESCONOCIDA") {
                    const data = manzanasData[mz];
                    const cx = (data.sumX / data.count) - minX;
                    const cy = (data.sumY / data.count) - minY;
                    
                    ctx.lineWidth = 6 / transform.scale;
                    ctx.strokeStyle = '#ffffff';
                    ctx.strokeText("Mz " + mz, cx, cy);
                    
                    ctx.fillStyle = '#000000';
                    ctx.fillText("Mz " + mz, cx, cy);
                }
            }

            ctx.restore();
        }

        // --- 4. CONTROLES E INTERACCIÓN ---
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                transform.x = e.offsetX - dragStart.x;
                transform.y = e.offsetY - dragStart.y;
                hasDragged = true;
                dibujarMapa();
                return;
            }

            ctx.save();
            ctx.translate(transform.x, transform.y);
            ctx.scale(transform.scale, transform.scale);
            
            let nuevoHover = null;
            for (let i = lotes.length - 1; i >= 0; i--) {
                let l = lotes[i];
                if (ctx.isPointInPath(l.path, e.offsetX, e.offsetY)) {
                    nuevoHover = l;
                    break;
                }
            }
            ctx.restore();

            if (nuevoHover !== loteHover) {
                loteHover = nuevoHover;
                canvas.style.cursor = loteHover ? 'pointer' : 'grab';
                dibujarMapa();
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            hasDragged = false;
            dragStart = { x: e.offsetX - transform.x, y: e.offsetY - transform.y };
        });

        canvas.addEventListener('mouseup', (e) => {
            isDragging = false;
            canvas.style.cursor = loteHover ? 'pointer' : 'grab';
            
            if (!hasDragged && loteHover) {
                loteSeleccionado = loteHover;
                dibujarMapa(); 
                
                inicialDiv.style.display = 'none';
                cardDiv.style.display = 'block';
                
                // PANEL LATERAL INTELIGENTE
                if (loteSeleccionado.estado === 'AREA_COMUN') {
                    // Diseño intocable para Parques
                    cardDiv.className = 'info-card';
                    cardDiv.style.borderLeftColor = '#7f8c8d';
                    cardDiv.innerHTML = `
                        <h4 style="color: #888; font-weight: normal; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;">
                            Mz ${loteSeleccionado.manzana} | Área Especial
                        </h4>
                        <h1 style="color: #f1c40f; font-size: 28px; margin: 0 0 15px 0; line-height: 1.2;">
                            ${loteSeleccionado.numero}
                        </h1>
                        <div style="background-color: #1a1a20; padding: 10px; border-radius: 6px; border: 1px solid #333;">
                            <p style="margin: 0; font-size: 14px; color: #bbb;">
                                <strong>Estado Legal:</strong> <span class="badge" style="background-color: #7f8c8d;">ZONA INTOCABLE</span>
                            </p>
                        </div>
                    `;
                } else {
    // ⚡ PANEL LATERAL LIMPIO (SOLO LECTURA)
    const esLibre = loteSeleccionado.estado !== 'OCUPADO';
    cardDiv.style.borderLeftColor = ''; 
    cardDiv.className = `info-card ${esLibre ? 'libre' : 'ocupado'}`;
    
    let nombreActual = loteSeleccionado.propietario !== 'Sin Propietario' ? loteSeleccionado.propietario : 'Ninguno';
    let colorTitulo = esLibre ? '#2ecc71' : '#e74c3c';

    cardDiv.innerHTML = `
        <div style="background: #2a2a2a; border-radius: 8px; padding: 15px; border-top: 4px solid ${colorTitulo}; color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            <h3 style="margin-top: 0; color: ${colorTitulo};">Mz ${loteSeleccionado.manzana} - Lote ${loteSeleccionado.numero}</h3>
            
            <div style="background: #1e1e1e; padding: 10px; border-radius: 6px; margin-bottom: 15px;">
                <p style="margin: 0 0 8px 0; font-size: 13px; color: #aaa;">Estado: <strong style="color: ${colorTitulo}">${loteSeleccionado.estado}</strong></p>
                <p style="margin: 0 0 8px 0; font-size: 13px; color: #aaa;">Dueño: <strong style="color: #fff">${nombreActual}</strong></p>
                ${loteSeleccionado.propietario_dni ? `<p style="margin: 0; font-size: 13px; color: #aaa;">DNI: <strong style="color: #fff">${loteSeleccionado.propietario_dni}</strong></p>` : ''}
            </div>

            <button onclick="abrirModal()" style="width: 100%; padding: 10px; background: #34495e; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s;" onmouseover="this.style.background='#2c3e50'" onmouseout="this.style.background='#34495e'">
                ✏️ Editar / Asignar
            </button>
        </div>
    `;
}
            } else if (!hasDragged && !loteHover) {
                loteSeleccionado = null;
                inicialDiv.style.display = 'block';
                cardDiv.style.display = 'none';
                dibujarMapa();
            }
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomDirection = e.deltaY > 0 ? 0.9 : 1.1; 
            transform.x = e.offsetX - (e.offsetX - transform.x) * zoomDirection;
            transform.y = e.offsetY - (e.offsetY - transform.y) * zoomDirection;
            transform.scale *= zoomDirection;
            dibujarMapa();
        });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        let debounceTimer;
document.getElementById('input-busqueda').addEventListener('input', function(e) {

// Función para mostrar el panel de edición cuando haces clic en un lote

    // Si tienes los datos del dueño en el objeto lote, los ponemos; si no, en blanco

            <input type="text" id="edit-dni" placeholder="DNI (Opcional)" value="${dniActual}" style="width: 100%; padding: 10px; margin-bottom: 15px; background: #1e1e1e; color: #fff; border: 1px solid #555; border-radius: 4px; box-sizing: border-box;">
            
            <label style="font-size: 12px; color: #aaa; display: block; margin-bottom: 5px;">Cambiar Estado Legal:</label>

                <option value="LIBRE" ${lote.estado === 'LIBRE' ? 'selected' : ''}>Libre (Verde)</option>

// ⚡ MOTOR DE LA VENTANA FLOTANTE (MODAL)

function abrirModal() {
    if (!loteSeleccionado) return;
    
    // Llenamos la ventana con los datos actuales del lote
    document.getElementById('modal-titulo').innerText = `Editar Mz ${loteSeleccionado.manzana} - Lte ${loteSeleccionado.numero}`;
    document.getElementById('modal-nombre').value = loteSeleccionado.propietario !== 'Sin Propietario' ? loteSeleccionado.propietario : '';
    document.getElementById('modal-dni').value = loteSeleccionado.propietario_dni || '';
    document.getElementById('modal-estado').value = loteSeleccionado.estado;
    document.getElementById('modal-mensaje').innerHTML = '';
    
    // Mostramos la ventana con efecto flex
    document.getElementById('modal-edicion').style.display = 'flex';
}

function cerrarModal() {
    document.getElementById('modal-edicion').style.display = 'none';
}

function liberarLoteEnModal() {
    // Botón rápido para borrar los datos y pasarlo a verde
    document.getElementById('modal-nombre').value = '';
    document.getElementById('modal-dni').value = '';
    document.getElementById('modal-estado').value = 'LIBRE';
}

function guardarDesdeModal() {
    const nombre = document.getElementById('modal-nombre').value.trim();
    const dni = document.getElementById('modal-dni').value.trim();
    const estado = document.getElementById('modal-estado').value;
    const msjDiv = document.getElementById('modal-mensaje');

    if (estado === 'OCUPADO' && nombre === "") {
        msjDiv.innerHTML = "<span style='color: #ff4d4d;'>⚠️ Se requiere un nombre para ocupar el lote.</span>";
        return;
    }

    msjDiv.innerHTML = "<span style='color: #aaa;'>Guardando...</span>";

    fetch('/api/actualizar-lote/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            manzana: loteSeleccionado.manzana,
            numero: loteSeleccionado.numero,
            nombres: nombre,
            dni: dni,
            estado_legal: estado
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            // Actualizamos la memoria del mapa
            loteSeleccionado.estado = estado;
            loteSeleccionado.propietario = nombre || 'Sin Propietario';
            loteSeleccionado.propietario_dni = dni;
            
            dibujarMapa(); // Repintamos para que cambie de color
            
            // Refrescamos el panel lateral para que muestre el nuevo dueño
            canvas.dispatchEvent(new MouseEvent('mouseup')); 
            
            cerrarModal(); // Cerramos la ventana automáticamente
        } else {
            msjDiv.innerHTML = `<span style='color: #ff4d4d;'>❌ Error: ${data.message}</span>`;
        }
    })
    .catch(error => {
        msjDiv.innerHTML = "<span style='color: #ff4d4d;'>❌ Error de conexión.</span>";
    });
}
// --- ⚡ 5. MOTOR TÁCTIL PARA CELULARES (MULTITÁCTIL) ---
        let touchStartDist = 0;
        let touchStartScale = 1;
        let toqueCorto = true;

        canvas.addEventListener('touchstart', (e) => {
            toqueCorto = true;
            if (e.touches.length === 1) {
                // 1 Dedo: Mover el mapa
                isDragging = true;
                hasDragged = false;
                const rect = canvas.getBoundingClientRect();
                dragStart = { 
                    x: e.touches[0].clientX - rect.left - transform.x, 
                    y: e.touches[0].clientY - rect.top - transform.y 
                };
            } else if (e.touches.length === 2) {
                // 2 Dedos: Pinch-to-Zoom (Calculamos la distancia inicial entre los dedos)
                isDragging = false;
                toqueCorto = false;
                touchStartDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                touchStartScale = transform.scale;
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            // ⚡ IMPORTANTE: Esto evita que la página web entera salte o se recargue mientras mueves el mapa
            e.preventDefault(); 
            
            if (isDragging && e.touches.length === 1) {
                const rect = canvas.getBoundingClientRect();
                transform.x = (e.touches[0].clientX - rect.left) - dragStart.x;
                transform.y = (e.touches[0].clientY - rect.top) - dragStart.y;
                hasDragged = true;
                toqueCorto = false;
                dibujarMapa();
            } else if (e.touches.length === 2 && touchStartDist > 0) {
                // Calculamos el zoom en tiempo real según qué tanto abres o cierras los dedos
                const distActual = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const factorZoom = distActual / touchStartDist;
                transform.scale = Math.max(0.1, Math.min(touchStartScale * factorZoom, 10)); // Límites de zoom
                dibujarMapa();
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            // Si fue un toque rápido (sin arrastrar con 1 dedo), seleccionamos el lote
            if (toqueCorto && e.changedTouches.length === 1 && !hasDragged) {
                const rect = canvas.getBoundingClientRect();
                const touchX = e.changedTouches[0].clientX - rect.left;
                const touchY = e.changedTouches[0].clientY - rect.top;
                
                // Usamos la memoria del canvas para ver qué lote tocaste
                ctx.save();
                ctx.translate(transform.x, transform.y);
                ctx.scale(transform.scale, transform.scale);
                
                let loteTocado = null;
                for (let i = lotes.length - 1; i >= 0; i--) {
                    if (ctx.isPointInPath(lotes[i].path, touchX, touchY)) {
                        loteTocado = lotes[i];
                        break;
                    }
                }
                ctx.restore();

                if (loteTocado) {
                    loteSeleccionado = loteTocado;
                    mostrarDetalleLote(loteSeleccionado);
                    dibujarMapa();
                }
            }
            isDragging = false;
        });
    </script>
